<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Due</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400&family=Source+Serif+4:wght@400&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg:      #f2f0e8;
      --surface: #f2f0e8;
      --dark:    #141413;
      --mid:     #9a9890;
      --muted:   #7c7a72;
      --border:  #dedad0;
      --orange:  #d97757;
      --blue:    #6a9bcc;
      --green:   #788c5d;
      --warm:    #b09050;
      --purple:  #a86070;
    }

    html[data-theme="dark"] {
      --bg:      #23262d;
      --surface: #23262d;
      --dark:    #eceff4;
      --mid:     #9aa3b2;
      --muted:   #7f8897;
      --border:  #343843;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--dark);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      padding: 18px 18px 14px;
      margin: 0;
    }

    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .task-list {
      list-style: none;
      margin-bottom: 12px;
      max-height: 320px;
      overflow-y: auto;
    }

    .task-list::-webkit-scrollbar { width: 3px; }
    .task-list::-webkit-scrollbar-track { background: transparent; }
    .task-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
    }

    .task-item:last-child { border-bottom: none; }

    .task-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }

    .task-dot.urgent  { background: var(--orange); }
    .task-dot.soon    { background: var(--warm); }
    .task-dot.exam    { background: var(--purple); }

    .task-body { flex: 1; min-width: 0; }

    .task-name {
      font-size: 14px;
      font-weight: 400;
      color: var(--dark);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.4;
    }

    .task-name.clickable {
      cursor: pointer;
    }

    .task-name.clickable:hover {
      color: var(--orange);
      text-decoration: underline;
    }

    .task-meta {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 400;
      color: var(--muted);
      margin-top: 1px;
    }

    .task-due {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 400;      
      flex-shrink: 0;
      margin-top: 4px;
    }

    .task-due.urgent { color: var(--orange); }
    .task-due.soon   { color: var(--warm); }
    .task-due.exam   { color: var(--purple); }
    .task-due.later  { color: var(--blue); }

    .empty-state {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--mid);
      text-align: center;
      padding: 24px 0 20px;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 12px 0;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 9px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--dark);
      color: var(--bg);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s;
    }

    .btn:hover { background: #2a2a27; }
    .btn { border-radius: 10px; }
  </style>
</head>
<body>
  <div class="section-label" id="task-label">NEXT 7-DAY TASKS</div>
  <ul class="task-list" id="task-list"></ul>

  <hr class="divider" />
  <button class="btn" id="dashboard-btn">開啟 Dashboard</button>

  <script src="popup.js"></script>
</body>
</html>
